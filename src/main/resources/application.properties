# ─────────────────────────────────────────
# SERVIDOR
# ─────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────
# BASE DE DATOS — MySQL
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mediTurnDB?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:password_por_defecto}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────
#Validate para cuando ya tienes el SQL listo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────
# NOMBRE DE LA APP
# ─────────────────────────────────────────
spring.application.name=mediturn-backend